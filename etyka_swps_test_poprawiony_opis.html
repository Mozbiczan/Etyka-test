<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Etyka SWPS — test</title>
<style>
:root {
  --bg1:#fff1f2;
  --bg2:#f8fafc;
  --card:#ffffff;
  --text:#171827;
  --muted:#6b7280;
  --primary:#e30613;
  --primary2:#8b0015;
  --accent:#ffccd2;
  --good:#16a34a;
  --good-bg:#dcfce7;
  --bad:#dc2626;
  --bad-bg:#fee2e2;
  --warn:#f59e0b;
  --warn-bg:#fffbeb;
  --border:#e5e7eb;
  --shadow:0 22px 60px rgba(31,41,55,.12);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(227,6,19,.20), transparent 34%),
    radial-gradient(circle at bottom right, rgba(139,0,21,.16), transparent 34%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}
.app{max-width:1040px;margin:0 auto;padding:28px}
.hero{
  min-height:84vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero-card{
  width:100%;
  max-width:880px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.75);
  border-radius:32px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.hero-main{padding:54px;text-align:center}
.kicker{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:#fee2e2;
  color:#9f1239;
  font-weight:800;
  font-size:13px;
  letter-spacing:.02em;
}
h1{
  font-size:clamp(36px,5vw,64px);
  line-height:1;
  margin:22px 0 16px;
  letter-spacing:-.05em;
}
.subtitle{
  color:var(--muted);
  font-size:18px;
  line-height:1.55;
  max-width:720px;
  margin-left:auto;
  margin-right:auto;
}
.stat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:28px 0;
}
.stat{
  padding:16px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
}
.stat strong{display:block;font-size:26px;color:#9f1239}
.stat span{font-size:13px;color:var(--muted)}
.control-box{
  margin-top:26px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:end;
}
label{font-weight:800;font-size:14px;text-align:left}
select{
  display:block;
  margin-top:8px;
  min-width:190px;
  padding:14px 16px;
  border-radius:16px;
  border:1px solid var(--border);
  background:#fff;
  font-size:16px;
  outline:none;
}
button{
  border:0;
  border-radius:16px;
  padding:15px 18px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  font-size:15px;
  box-shadow:0 12px 30px rgba(227,6,19,.22);
}
button.secondary{
  background:#fff;
  color:#374151;
  border:1px solid var(--border);
  box-shadow:none;
}
button.report{
  background:var(--warn-bg);
  color:#92400e;
  border:1px solid #fde68a;
  box-shadow:none;
}
button:disabled{opacity:.55;cursor:not-allowed}
.screen{display:none}
.screen.active{display:block}
.quiz-shell{
  max-width:860px;
  margin:26px auto;
}
.top-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  background:rgba(255,255,255,.86);
  border:1px solid rgba(255,255,255,.85);
  padding:10px 14px;
  border-radius:999px;
  font-weight:800;
  color:#374151;
}
.progress-wrap{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.72);
  border-radius:999px;
  overflow:hidden;
  margin:14px 0 24px;
  border:1px solid rgba(255,255,255,.75);
}
.progress{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--primary2));transition:.25s}
.question-card{
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.82);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:32px;
}
.source{
  display:inline-flex;
  margin-bottom:12px;
  padding:7px 10px;
  border-radius:999px;
  background:#fff1f2;
  color:#9f1239;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.05em;
}
.question-title{
  font-size:26px;
  line-height:1.25;
  letter-spacing:-.02em;
  margin:0 0 22px;
}
.answer{
  display:flex;
  align-items:flex-start;
  gap:14px;
  width:100%;
  padding:16px;
  margin:10px 0;
  border:2px solid var(--border);
  background:#fff;
  border-radius:18px;
  cursor:pointer;
  transition:.16s;
  line-height:1.42;
}
.answer:hover{
  border-color:#fecdd3;
  transform:translateY(-1px);
}
.letter{
  flex:0 0 34px;
  width:34px;
  height:34px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:#fff1f2;
  font-weight:900;
  color:#9f1239;
}
.answer-text{padding-top:6px}
.answer.correct{
  border-color:var(--good);
  background:var(--good-bg);
}
.answer.correct .letter{
  background:var(--good);
  color:#fff;
}
.answer.wrong{
  border-color:var(--bad);
  background:var(--bad-bg);
}
.answer.wrong .letter{
  background:var(--bad);
  color:#fff;
}
.answer.locked{cursor:default}
.feedback{
  margin-top:18px;
  padding:16px;
  border-radius:18px;
  font-weight:900;
  display:none;
}
.feedback.good{display:block;background:var(--good-bg);color:#166534}
.feedback.bad{display:block;background:var(--bad-bg);color:#991b1b}
.actions{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:22px;
  flex-wrap:wrap;
}
.left-actions,.right-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.result-card{
  max-width:760px;
  margin:40px auto;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.85);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:42px;
  text-align:center;
}
.result-score{
  font-size:64px;
  line-height:1;
  font-weight:1000;
  letter-spacing:-.06em;
  margin:12px 0;
  color:#9f1239;
}
.result-percent{
  display:inline-flex;
  padding:10px 16px;
  border-radius:999px;
  background:#fee2e2;
  color:#9f1239;
  font-weight:900;
}
.review{
  text-align:left;
  margin-top:26px;
  max-height:330px;
  overflow:auto;
  border-top:1px solid var(--border);
  padding-top:16px;
}
.review-item{
  padding:12px 0;
  border-bottom:1px solid #f1f5f9;
}
.review-item b{display:block;margin-bottom:4px}
.ok{color:var(--good);font-weight:900}
.no{color:var(--bad);font-weight:900}
@media(max-width:820px){
  .app{padding:16px}
  .hero-main{padding:30px 22px}
  .stat-grid{grid-template-columns:1fr}
  .question-card{padding:22px}
  .question-title{font-size:21px}
  .top-nav{align-items:flex-start;flex-direction:column}
  .actions{flex-direction:column}
  .left-actions,.right-actions{width:100%}
  .left-actions button,.right-actions button{flex:1}
}
</style>
</head>
<body>
<div class="app">

<section id="startScreen" class="screen active hero">
  <div class="hero-card">
    <div class="hero-main">
      <h1>Etyka w zastosowaniach psychologii</h1>
      <p class="subtitle">Jeśli znajdziesz błędne pytanie, zgłoś je za pomocą przycisku „Zgłoś pytanie”.</p>

      <div class="stat-grid">
        <div class="stat"><strong id="statQuestions">0</strong><span>pytań w bazie</span></div>
        <div class="stat"><strong>1</strong><span>poprawna odpowiedź</span></div>
        <div class="stat"><strong>∞</strong><span>losowych podejść</span></div>
      </div>

      <div class="control-box">
        <label>Ile pytań chcesz?
          <select id="count"></select>
        </label>
        <button onclick="startQuiz()">Rozpocznij test</button>
        <button class="secondary" onclick="quickAll()">Cała baza</button>
      </div>
    </div>
  </div>
</section>

<section id="quizScreen" class="screen">
  <div class="quiz-shell">
    <div class="top-nav">
      <div>
        <span class="pill" id="counterPill">Pytanie 1 / 1</span>
        <span class="pill" id="scorePill">Wynik: 0</span>
      </div>
      <button class="secondary" onclick="backHome()">Zakończ</button>
    </div>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>
    <div class="question-card" id="questionCard"></div>
  </div>
</section>

<section id="resultScreen" class="screen">
  <div class="result-card">
    <span class="kicker">WYNIK KOŃCOWY</span>
    <div class="result-score" id="finalScore">0 / 0</div>
    <div class="result-percent" id="finalPercent">0%</div>
    <p class="subtitle" id="resultText" style="margin-left:auto;margin-right:auto"></p>
    <div>
      <button onclick="startQuiz()">Jeszcze raz</button>
      <button class="secondary" onclick="backHome()">Wróć do startu</button>
    </div>
    <div class="review" id="reviewBox"></div>
  </div>
</section>

</div>

alse}, {"text": "Sygnaliści najczęściej działają z pobudek finansowych", "correct": false}]}, {"q": "Psycholog dowiaduje się, że jego klient, osoba ze zdiagnozowaną chorobą psychiczną, wykorzystuje seksualnie osoby nieletnie. W tej sytuacji psycholog:", "source": "plik Word", "answers": [{"text": "powinien niezwłocznie powiadomić organy ścigania, np. policję", "correct": true}, {"text": "powinien skonsultować się z np. superwizorem zanim złamie tajemnicę zawodową", "correct": false}, {"text": "nie może złamać tajemnicy zawodowej ze względu na ustawę o ochronie zdrowia psychicznego", "correct": false}, {"text": "powinien niezwłocznie powiadomić superwizora", "correct": false}]}, {"q": "Przez sytuację złożoności ról rozumiemy:", "source": "plik Word", "answers": [{"text": "podejmowanie dodatkowych zadań w przypadku wielości podejmowanych przez psychologa ról w miejscu pracy", "correct": false}, {"text": "podejmowanie usługi psychologicznej w sytuacji, gdy psycholog jest z klientem w relacji zawodowej i jednocześnie relacji przyjacielskiej", "correct": true}, {"text": "podejmowanie zadań, które są niezgodne z zawodem psychologa", "correct": false}, {"text": "podejmowanie zadań, które wykraczają poza kompetencje psychologa", "correct": false}]}, {"q": "Dyrektor prosi psychologa szkolnego o pomoc w sytuacji dziecka z diagnozą ADHD utrudniającego prowadzenie lekcji. Rolą psychologa jest:", "source": "plik Word", "answers": [{"text": "wszystkie odpowiedzi są prawidłowe", "correct": false}, {"text": "upomnienie dziecka", "correct": false}, {"text": "wskazanie nauczycielowi wskazówek odnośnie pracy z dzieckiem z diagnozą ADHD", "correct": true}, {"text": "zaproszenie rodziców na rozmowę na temat trudnego zachowania dziecka", "correct": false}]}];

let active = [];
let current = 0;
let score = 0;
let locked = false;
let results = [];

function shuffle(a) {
  return a.map(v => [Math.random(), v]).sort((x,y) => x[0]-y[0]).map(x => x[1]);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function initCounts() {
  document.getElementById('statQuestions').textContent = DATA.length;
  const sel = document.getElementById('count');
  sel.innerHTML = '';
  [10,20,30,40,50,75,DATA.length]
    .filter((v,i,a) => v <= DATA.length && a.indexOf(v) === i)
    .forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v === DATA.length ? 'wszystkie (' + v + ')' : v;
      sel.appendChild(o);
    });
}

function quickAll() {
  document.getElementById('count').value = DATA.length;
  startQuiz();
}

function startQuiz() {
  const n = parseInt(document.getElementById('count').value || DATA.length);
  active = shuffle(DATA).slice(0, n).map(q => ({...q, answers: shuffle(q.answers)}));
  current = 0;
  score = 0;
  locked = false;
  results = [];
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = active[current];
  const card = document.getElementById('questionCard');
  const letters = ['A','B','C','D','E','F'];

  document.getElementById('counterPill').textContent = 'Pytanie ' + (current + 1) + ' / ' + active.length;
  document.getElementById('scorePill').textContent = 'Wynik: ' + score;
  document.getElementById('progress').style.width = ((current) / active.length * 100) + '%';

  card.innerHTML = '';
  const src = document.createElement('div');
  src.className = 'source';
  src.textContent = 'pytanie z pliku Word';
  card.appendChild(src);

  const h = document.createElement('h2');
  h.className = 'question-title';
  h.textContent = q.q;
  card.appendChild(h);

  q.answers.forEach((a, idx) => {
    const div = document.createElement('div');
    div.className = 'answer';
    div.innerHTML = '<div class="letter">' + letters[idx] + '</div><div class="answer-text">' + escapeHtml(a.text) + '</div>';
    div.onclick = () => chooseAnswer(idx);
    card.appendChild(div);
  });

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.id = 'feedback';
  card.appendChild(fb);

  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `
    <div class="left-actions">
      <button class="report" onclick="reportQuestion()">Zgłoś pytanie</button>
      <button class="secondary" onclick="skipQuestion()">Pomiń</button>
    </div>
    <div class="right-actions">
      <button id="nextBtn" onclick="nextQuestion()" disabled>Następne</button>
    </div>
  `;
  card.appendChild(actions);
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function chooseAnswer(idx) {
  if (locked) return;
  locked = true;

  const q = active[current];
  const answers = [...document.querySelectorAll('.answer')];
  const chosen = q.answers[idx];
  const correctIndex = q.answers.findIndex(a => a.correct);
  const isCorrect = !!chosen.correct;

  answers.forEach((el, i) => {
    el.classList.add('locked');
    if (q.answers[i].correct) el.classList.add('correct');
  });
  if (!isCorrect) answers[idx].classList.add('wrong');

  if (isCorrect) score += 1;

  results.push({
    q: q.q,
    ok: isCorrect,
    chosen: chosen.text,
    correct: q.answers[correctIndex].text
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'good' : 'bad');
  fb.textContent = isCorrect ? 'Dobrze ✅' : 'Źle ❌ — poprawna odpowiedź jest podświetlona na zielono.';
  document.getElementById('scorePill').textContent = 'Wynik: ' + score;
  document.getElementById('nextBtn').disabled = false;
}

function skipQuestion() {
  if (locked) return;
  locked = true;

  const q = active[current];
  const answers = [...document.querySelectorAll('.answer')];
  const correctIndex = q.answers.findIndex(a => a.correct);

  answers.forEach((el, i) => {
    el.classList.add('locked');
    if (q.answers[i].correct) el.classList.add('correct');
  });

  results.push({
    q: q.q,
    ok: false,
    chosen: 'Pominięto',
    correct: q.answers[correctIndex].text
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback bad';
  fb.textContent = 'Pominięte — poprawna odpowiedź jest podświetlona na zielono.';
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (current < active.length - 1) {
    current += 1;
    renderQuestion();
  } else {
    showResult();
  }
}

function getGitHubIssueUrl(q) {
  const host = window.location.hostname;
  const pathParts = window.location.pathname.split('/').filter(Boolean);

  let owner = '';
  let repo = '';

  if (host.endsWith('.github.io')) {
    owner = host.replace('.github.io', '');
    repo = pathParts[0] || '';
  }

  const title = '[Błąd w pytaniu] ' + q.q.slice(0, 80);

  const correct = q.answers.find(a => a.correct);
  const body =
`Zgłaszam błąd w pytaniu.

**Pytanie w aktualnym zestawie:** ${current + 1} / ${active.length}

**Treść pytania:**
${q.q}

**Odpowiedzi:**
${q.answers.map((a, i) => `${String.fromCharCode(65+i)}. ${a.text}`).join('\n')}

**Poprawna odpowiedź według testu:**
${correct ? correct.text : 'brak'}

**Co jest nie tak?**
Opisz tutaj, co trzeba poprawić:
`;

  if (owner && repo) {
    return 'https://github.com/' + owner + '/' + repo + '/issues/new?title=' +
      encodeURIComponent(title) + '&body=' + encodeURIComponent(body);
  }

  const fallback = 'Nie udało się automatycznie wykryć repozytorium GitHub.\n\n' +
    'Skopiuj zgłoszenie i wklej je ręcznie w GitHub Issues:\n\n' +
    title + '\n\n' + body;
  alert(fallback);
  return null;
}

function reportQuestion() {
  const q = active[current];
  const url = getGitHubIssueUrl(q);
  if (url) window.open(url, '_blank');
}

function showResult() {
  document.getElementById('progress').style.width = '100%';
  showScreen('resultScreen');
  const percent = active.length ? Math.round(score / active.length * 100) : 0;
  document.getElementById('finalScore').textContent = score + ' / ' + active.length;
  document.getElementById('finalPercent').textContent = percent + '%';

  let txt = 'Dobry trening — możesz wylosować kolejny zestaw.';
  if (percent >= 90) txt = 'Mega wynik. To już wygląda bardzo pewnie.';
  else if (percent >= 70) txt = 'Jest dobrze. Warto powtórzyć pytania, które wpadły źle.';
  else if (percent >= 50) txt = 'Połowa za Tobą. Jeszcze kilka rund i będzie dużo lepiej.';
  else txt = 'To była rozgrzewka. Zrób kolejne podejście i utrwal zielone odpowiedzi.';
  document.getElementById('resultText').textContent = txt;

  const review = document.getElementById('reviewBox');
  review.innerHTML = '<h3>Podsumowanie odpowiedzi</h3>';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = '<b>' + (i+1) + '. ' + escapeHtml(r.q) + '</b>' +
      '<span class="' + (r.ok ? 'ok' : 'no') + '">' + (r.ok ? 'Dobrze' : 'Źle') + '</span><br>' +
      '<small>Twoja odpowiedź: ' + escapeHtml(r.chosen) + '</small><br>' +
      '<small>Poprawna: ' + escapeHtml(r.correct) + '</small>';
    review.appendChild(div);
  });
}

function backHome() {
  showScreen('startScreen');
}

initCounts();
</script>
</body>
